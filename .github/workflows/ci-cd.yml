name: CI/CD — Banking RAG

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  EC2_SSH_PORT: "22"

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. LINT
  # ──────────────────────────────────────────────────────────────
  lint:
    name: 🧹 Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check src/ tests/ eval/

  # ──────────────────────────────────────────────────────────────
  # 2. UNIT TESTS — no LLM, fast
  # ──────────────────────────────────────────────────────────────
  unit_tests:
    name: 🧪 Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────
  # 3. RAG EVALUATION — calls the real LLM, gates on metrics
  # ──────────────────────────────────────────────────────────────
  evaluate:
    name: 📊 RAG eval + baseline comparison
    needs: [lint, unit_tests]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run golden-dataset eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python eval/run_eval.py
      - name: Compare against baseline
        run: python eval/compare_to_baseline.py
      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval/results.json
          retention-days: 90
      - name: Comment on PR with eval summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('eval/results.json'));
            const m = r.metrics;
            const ok = r.all_passed ? '✅ PASS' : '❌ FAIL';
            const body = `### RAG Eval ${ok}
            | Metric | Value |
            |---|---|
            | retrieval recall@3 | ${(m.retrieval_recall_at_3 * 100).toFixed(1)}% |
            | answer correctness | ${(m.answer_correctness * 100).toFixed(1)}% |
            | p95 latency | ${m.p95_latency_ms} ms |
            | avg cost / query | $${m.avg_cost_per_query_usd} |`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

  # ──────────────────────────────────────────────────────────────
  # 4. DEPLOY TO STAGING (EC2 via SSH)
  # Required secrets (repo or staging environment):
  #   EC2_HOST, EC2_USERNAME, EC2_SSH_PRIVATE_KEY, EC2_DEPLOY_PATH
  # EC2_DEPLOY_PATH = existing project root on EC2 (e.g. /home/ubuntu/rag_ci_cd)
  # Optional: EC2_SSH_PORT
  # ──────────────────────────────────────────────────────────────
  deploy_staging:
    name: 🚀 Deploy to staging (EC2)
    needs: evaluate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
    env:
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify EC2_DEPLOY_PATH secret
        run: |
          if [[ -z "$EC2_DEPLOY_PATH" ]]; then
            echo "Set EC2_DEPLOY_PATH to your existing app folder on EC2 (project root)."
            exit 1
          fi
          echo "Deploy target: $EC2_DEPLOY_PATH"

      - name: Sync code to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || env.EC2_SSH_PORT }}
          source: "src,eval,tests,scripts,requirements.txt,ruff.toml"
          target: ${{ env.EC2_DEPLOY_PATH }}/
          strip_components: 0
          overwrite: true

      - name: Run deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_DEPLOY_PATH: ${{ env.EC2_DEPLOY_PATH }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || env.EC2_SSH_PORT }}
          envs: EC2_DEPLOY_PATH,ANTHROPIC_API_KEY
          script: |
            set -e
            test -d "$EC2_DEPLOY_PATH" || { echo "Missing folder: $EC2_DEPLOY_PATH"; exit 1; }
            test -f "$EC2_DEPLOY_PATH/scripts/deploy-ec2.sh" || {
              echo "deploy-ec2.sh not found under $EC2_DEPLOY_PATH/scripts — check SCP target"
              exit 1
            }
            chmod +x "$EC2_DEPLOY_PATH/scripts/deploy-ec2.sh"
            bash "$EC2_DEPLOY_PATH/scripts/deploy-ec2.sh"

      - name: Smoke test (SSH connectivity)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || env.EC2_SSH_PORT }}
          script: |
            DEPLOY="${{ env.EC2_DEPLOY_PATH }}"
            test -f "$DEPLOY/src/agent.py"
            test -f "$DEPLOY/requirements.txt"
            test -x "$DEPLOY/scripts/deploy-ec2.sh"
            echo "Staging deploy OK — synced code present at $DEPLOY"

  # ──────────────────────────────────────────────────────────────
  # 5. DEPLOY TO PRODUCTION (EC2 via SSH, manual approval)
  # Use production environment secrets for a separate EC2 if needed.
  # ──────────────────────────────────────────────────────────────
  deploy_production:
    name: 🌐 Deploy to production (EC2)
    needs: deploy_staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
    env:
      EC2_DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download eval results
        uses: actions/download-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval

      - name: Verify EC2_DEPLOY_PATH secret
        run: |
          if [[ -z "$EC2_DEPLOY_PATH" ]]; then
            echo "Set EC2_DEPLOY_PATH to your existing app folder on EC2 (project root)."
            exit 1
          fi
          echo "Deploy target: $EC2_DEPLOY_PATH"

      - name: Sync code to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || env.EC2_SSH_PORT }}
          source: "src,eval,tests,scripts,requirements.txt,ruff.toml"
          target: ${{ env.EC2_DEPLOY_PATH }}/
          strip_components: 0
          overwrite: true

      - name: Run deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          EC2_DEPLOY_PATH: ${{ env.EC2_DEPLOY_PATH }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || env.EC2_SSH_PORT }}
          envs: EC2_DEPLOY_PATH,ANTHROPIC_API_KEY
          script: |
            set -e
            test -d "$EC2_DEPLOY_PATH" || { echo "Missing folder: $EC2_DEPLOY_PATH"; exit 1; }
            test -f "$EC2_DEPLOY_PATH/scripts/deploy-ec2.sh" || {
              echo "deploy-ec2.sh not found under $EC2_DEPLOY_PATH/scripts — check SCP target"
              exit 1
            }
            chmod +x "$EC2_DEPLOY_PATH/scripts/deploy-ec2.sh"
            bash "$EC2_DEPLOY_PATH/scripts/deploy-ec2.sh"

      - name: Update baseline (so future PRs compare against new prod)
        run: |
          cp eval/results.json eval/baseline.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eval/baseline.json
          git commit -m "chore(eval): update baseline after prod deploy ${{ github.sha }}"
          git push

